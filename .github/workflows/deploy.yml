name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Security check, build, and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_VERSION: 22
      CLOUDFLARE_PROJECT_NAME: liyuanstudiocom
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID || 'team_I2l4qs9iDsMVQTTvVZ3kNg5n' }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID || 'prj_GWA2MHwmjPLxbQw3vqqWthutWY7Z' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security scan
        run: npm run check:secrets

      - name: Check deployment secrets
        id: deployment_secrets
        run: |
          missing_names=()
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID VERCEL_TOKEN; do
            if [ -z "${!name}" ]; then
              missing_names+=("$name")
            fi
          done

          if [ "${#missing_names[@]}" -eq 0 ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            echo "missing_names=${missing_names[*]}" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build frontend
        run: npm run build

      - name: Build API
        run: npm run build:api

      - name: Skip deployment
        if: steps.deployment_secrets.outputs.can_deploy != 'true'
        run: |
          echo "::notice::Skipping deployment because required deployment secrets are not configured: ${{ steps.deployment_secrets.outputs.missing_names }}. Secret scan and builds completed successfully."

      - name: Deploy to Cloudflare Pages
        if: steps.deployment_secrets.outputs.can_deploy == 'true'
        run: npx wrangler pages deploy dist --project-name "$CLOUDFLARE_PROJECT_NAME" --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Vercel
        if: steps.deployment_secrets.outputs.can_deploy == 'true'
        run: npx vercel deploy --prod --yes --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
