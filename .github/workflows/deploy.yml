name: Deploy gray candidate

on:
  push:
    branches: [main]

concurrency:
  group: gray-release
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Build and deploy protected gray candidate
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: 22
      VERCEL_CLI_VERSION: 50.28.0
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID || 'team_I2l4qs9iDsMVQTTvVZ3kNg5n' }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID || 'prj_GWA2MHwmjPLxbQw3vqqWthutWY7Z' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security scan
        run: npm run check:secrets

      - name: Check gray deployment secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN is not configured"
            exit 1
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Run tests
        run: npm test
        env:
          VITE_API_BASE_URL: /api

      - name: Build frontend
        run: npm run build

      - name: Build API
        run: npm run build:api

      - name: Build deploy console
        run: npm run build:deploy-console

      - name: Validate clean deployment tree
        run: npm run guard:clean-deploy

      - name: Create gray deployment
        id: gray_deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'gray',
              auto_merge: false,
              required_contexts: [],
              description: 'Protected LA admin gray candidate',
              transient_environment: true,
              production_environment: false,
            });
            core.setOutput('id', deployment.data.id);

      - name: Deploy full application to Vercel Preview
        id: vercel_preview
        run: |
          preview_url="$(npx --yes "vercel@${VERCEL_CLI_VERSION}" deploy --yes --token "$VERCEL_TOKEN" --build-env VITE_API_BASE_URL=/api)"
          node -e "const url = new URL(process.argv[1]); if (url.protocol !== 'https:' || !url.hostname.endsWith('.vercel.app') || url.username || url.password) process.exit(1)" "$preview_url" ||
            { echo "::error::Vercel returned an invalid preview URL"; exit 1; }
          echo "url=$preview_url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_CLI_VERSION: ${{ env.VERCEL_CLI_VERSION }}

      - name: Mark gray deployment successful
        if: success()
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_ID: ${{ steps.gray_deployment.outputs.id }}
          PREVIEW_URL: ${{ steps.vercel_preview.outputs.url }}
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: 'success',
              environment: 'gray',
              environment_url: process.env.PREVIEW_URL,
              description: 'Ready for LA admin review',
              auto_inactive: false,
            });

      - name: Mark gray deployment failed
        if: always() && steps.gray_deployment.outputs.id && steps.vercel_preview.outcome != 'success'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_ID: ${{ steps.gray_deployment.outputs.id }}
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: 'failure',
              environment: 'gray',
              description: 'Gray deployment failed',
              auto_inactive: false,
            });
