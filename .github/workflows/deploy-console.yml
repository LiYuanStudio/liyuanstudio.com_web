name: Deploy deploy-console Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'deploy-console/**'
      - '.github/workflows/deploy-console.yml'

concurrency:
  group: deploy-console-worker
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and test
        run: |
          npm run build:deploy-console
          npm run test:deploy-console

      - name: Require Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured"
              exit 1
            fi
          done

      - name: Deploy Worker
        id: deploy
        continue-on-error: true
        run: npm run deploy --workspace=deploy-console
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Fail with Workers permission guidance
        if: steps.deploy.outcome == 'failure'
        run: |
          echo "::error::wrangler deploy failed. CLOUDFLARE_API_TOKEN must include Workers Scripts Edit (and Account Settings Read) in addition to Cloudflare Pages permissions used by promote.yml. Update the token in the Cloudflare dashboard, then re-run this workflow."
          exit 1
