name: Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Test, build, and validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Scan for secrets
        run: npm run check:secrets

      - name: Run tests
        run: npm test
        env:
          VITE_API_BASE_URL: /api

      - name: Build frontend
        run: npm run build

      - name: Build API
        run: npm run build:api

      - name: Build deploy console
        run: npm run build:deploy-console

      - name: Validate deployment tree
        run: npm run guard:clean-deploy
