name: Promote gray candidate

on:
  workflow_dispatch:
    inputs:
      deployment_id:
        description: GitHub gray deployment ID
        required: true
        type: string
      sha:
        description: Approved commit SHA
        required: true
        type: string
      approved_by:
        description: LA administrator recorded by the deploy console
        required: true
        type: string

concurrency:
  group: production-release
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  promote:
    name: Verify and deploy approved commit
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: 22
      CLOUDFLARE_PROJECT_NAME: liyuanstudiocom
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID || 'team_I2l4qs9iDsMVQTTvVZ3kNg5n' }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID || 'prj_GWA2MHwmjPLxbQw3vqqWthutWY7Z' }}
      APPROVED_DEPLOYMENT_ID: ${{ inputs.deployment_id }}
      APPROVED_SHA: ${{ inputs.sha }}
      APPROVED_BY: ${{ inputs.approved_by }}

    steps:
      - name: Verify latest gray deployment
        id: verify
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentId = Number(process.env.APPROVED_DEPLOYMENT_ID);
            const sha = process.env.APPROVED_SHA;
            if (!Number.isSafeInteger(deploymentId) || deploymentId <= 0 || !/^[0-9a-f]{40}$/i.test(sha)) {
              core.setFailed('Invalid deployment ID or commit SHA');
              return;
            }

            const latest = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment: 'gray',
              per_page: 1,
            });
            const candidate = latest.data[0];
            if (!candidate || candidate.id !== deploymentId || candidate.sha !== sha) {
              core.setFailed('Approval is not for the latest gray deployment');
              return;
            }

            const statuses = await github.rest.repos.listDeploymentStatuses({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deploymentId,
              per_page: 1,
            });
            let previewUrl;
            try {
              previewUrl = new URL(statuses.data[0]?.environment_url);
            } catch {
              previewUrl = null;
            }
            if (
              statuses.data[0]?.state !== 'success' ||
              previewUrl?.protocol !== 'https:' ||
              !previewUrl.hostname.endsWith('.vercel.app') ||
              previewUrl.username ||
              previewUrl.password
            ) {
              core.setFailed('The latest gray deployment is not ready');
              return;
            }

            const production = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment: 'production',
              sha,
              per_page: 10,
            });
            const previous = production.data.find((deployment) => {
              const grayId = deployment.payload?.gray_deployment_id;
              return deployment.creator?.login === 'github-actions[bot]' &&
                deployment.description?.startsWith('Approved through LA deploy console by ') &&
                (typeof grayId === 'number' || typeof grayId === 'string') &&
                String(grayId) === String(deploymentId);
            });
            if (previous) {
              const previousStatuses = await github.rest.repos.listDeploymentStatuses({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: previous.id,
                per_page: 1,
              });
              const state = previousStatuses.data[0]?.state ?? 'pending';
              if (state === 'success' || state === 'pending' || state === 'in_progress') {
                core.setFailed('This commit is already released or has an active production deployment');
                return;
              }
            }

      - name: Check production deployment secrets
        run: |
          missing_names=()
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID VERCEL_TOKEN; do
            if [ -z "${!name}" ]; then
              missing_names+=("$name")
            fi
          done
          if [ "${#missing_names[@]}" -ne 0 ]; then
            echo "::error::Missing production deployment secrets: ${missing_names[*]}"
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Checkout approved commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security scan
        run: npm run check:secrets

      - name: Run tests
        run: npm test
        env:
          VITE_API_BASE_URL: /api

      - name: Build frontend
        run: npm run build

      - name: Build API
        run: npm run build:api

      - name: Build deploy console
        run: npm run build:deploy-console

      - name: Validate clean deployment tree
        run: npm run guard:clean-deploy

      - name: Recheck latest gray deployment before release
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentId = Number(process.env.APPROVED_DEPLOYMENT_ID);
            const latest = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment: 'gray',
              per_page: 1,
            });
            const candidate = latest.data[0];
            const statuses = candidate && await github.rest.repos.listDeploymentStatuses({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: candidate.id,
              per_page: 1,
            });
            let previewUrl;
            try {
              previewUrl = new URL(statuses?.data[0]?.environment_url);
            } catch {
              previewUrl = null;
            }
            if (
              !candidate ||
              candidate.id !== deploymentId ||
              candidate.sha !== process.env.APPROVED_SHA ||
              statuses?.data[0]?.state !== 'success' ||
              previewUrl?.protocol !== 'https:' ||
              !previewUrl.hostname.endsWith('.vercel.app') ||
              previewUrl.username ||
              previewUrl.password
            ) {
              core.setFailed('The approved deployment is no longer the latest ready gray candidate');
            }

      - name: Record previous successful production
        id: previous_production
        uses: actions/github-script@v7
        with:
          script: |
            function isConsolePromotion(deployment) {
              return deployment.creator?.login === 'github-actions[bot]' &&
                typeof deployment.description === 'string' &&
                deployment.description.startsWith('Approved through LA deploy console by ') &&
                deployment.payload &&
                typeof deployment.payload === 'object' &&
                ('gray_deployment_id' in deployment.payload);
            }

            const deployments = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment: 'production',
              per_page: 30,
            });

            for (const deployment of deployments.data) {
              if (!isConsolePromotion(deployment)) continue;
              if (deployment.sha === process.env.APPROVED_SHA) continue;
              const statuses = await github.rest.repos.listDeploymentStatuses({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.id,
                per_page: 1,
              });
              if (statuses.data[0]?.state !== 'success') continue;
              core.setOutput('found', 'true');
              core.setOutput('sha', deployment.sha);
              core.setOutput('targets', 'vercel,cloudflare');
              core.info(`Previous successful production SHA: ${deployment.sha}`);
              return;
            }

            core.setOutput('found', 'false');
            core.setOutput('sha', '');
            core.setOutput('targets', '');
            core.info('No previous successful production deployment found for compensation');

      - name: Create production deployment
        id: production_deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: process.env.APPROVED_SHA,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              description: `Approved through LA deploy console by ${process.env.APPROVED_BY}`,
              payload: {
                gray_deployment_id: Number(process.env.APPROVED_DEPLOYMENT_ID),
                approved_by: process.env.APPROVED_BY,
              },
              transient_environment: false,
              production_environment: true,
            });
            core.setOutput('id', deployment.data.id);

      - name: Mark production deployment pending
        uses: actions/github-script@v7
        env:
          PRODUCTION_DEPLOYMENT_ID: ${{ steps.production_deployment.outputs.id }}
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.PRODUCTION_DEPLOYMENT_ID),
              state: 'pending',
              environment: 'production',
              description: 'Deploying approved gray candidate',
              auto_inactive: false,
            });

      - name: Deploy API to Vercel production
        id: vercel_production
        continue-on-error: true
        run: |
          production_url="$(npx --yes vercel@50.28.0 deploy --prod --yes --token "$VERCEL_TOKEN")"
          node -e "const url = new URL(process.argv[1]); if (url.protocol !== 'https:' || !url.hostname.endsWith('.vercel.app') || url.username || url.password) process.exit(1)" "$production_url" ||
            { echo "::error::Vercel returned an invalid production URL"; exit 1; }
          echo "url=$production_url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy frontend to Cloudflare Pages production
        id: cloudflare_production
        continue-on-error: true
        run: npx wrangler pages deploy dist --project-name "$CLOUDFLARE_PROJECT_NAME" --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Compensate changed targets after partial failure
        id: compensate
        if: >-
          always() &&
          steps.previous_production.outputs.found == 'true' &&
          (steps.vercel_production.outcome == 'success' || steps.cloudflare_production.outcome == 'success') &&
          (steps.vercel_production.outcome != 'success' || steps.cloudflare_production.outcome != 'success')
        env:
          PREVIOUS_SHA: ${{ steps.previous_production.outputs.sha }}
          VERCEL_OUTCOME: ${{ steps.vercel_production.outcome }}
          CLOUDFLARE_OUTCOME: ${{ steps.cloudflare_production.outcome }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          rollback_vercel=skipped
          rollback_cloudflare=skipped

          git checkout --force "$PREVIOUS_SHA"
          npm ci

          if [ "$VERCEL_OUTCOME" = "success" ] && [ "$CLOUDFLARE_OUTCOME" != "success" ]; then
            echo "::notice::Rolling back Vercel API to $PREVIOUS_SHA"
            npm run build:api
            if npx --yes vercel@50.28.0 deploy --prod --yes --token "$VERCEL_TOKEN"; then
              rollback_vercel=success
            else
              rollback_vercel=failure
              echo "::error::Vercel compensation deploy failed"
            fi
          fi

          if [ "$CLOUDFLARE_OUTCOME" = "success" ] && [ "$VERCEL_OUTCOME" != "success" ]; then
            echo "::notice::Rolling back Cloudflare Pages to $PREVIOUS_SHA"
            npm run build
            if npx wrangler pages deploy dist --project-name "$CLOUDFLARE_PROJECT_NAME" --branch main; then
              rollback_cloudflare=success
            else
              rollback_cloudflare=failure
              echo "::error::Cloudflare compensation deploy failed"
            fi
          fi

          {
            echo "rollback_vercel=$rollback_vercel"
            echo "rollback_cloudflare=$rollback_cloudflare"
          } >> "$GITHUB_OUTPUT"

          if [ "$VERCEL_OUTCOME" = "success" ] && [ "$CLOUDFLARE_OUTCOME" = "success" ]; then
            echo "Unexpected compensate invocation while both targets succeeded"
            exit 1
          fi

      - name: Mark production deployment successful
        id: production_success
        if: >-
          success() &&
          steps.vercel_production.outcome == 'success' &&
          steps.cloudflare_production.outcome == 'success'
        uses: actions/github-script@v7
        env:
          PRODUCTION_DEPLOYMENT_ID: ${{ steps.production_deployment.outputs.id }}
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL || 'https://liyuanstudio.com' }}
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.PRODUCTION_DEPLOYMENT_ID),
              state: 'success',
              environment: 'production',
              environment_url: process.env.PRODUCTION_URL,
              description: 'Approved gray candidate released to production; vercel=success; cloudflare=success',
              auto_inactive: true,
            });

      - name: Deactivate promoted gray candidate
        if: steps.production_success.outcome == 'success'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.APPROVED_DEPLOYMENT_ID),
              state: 'inactive',
              environment: 'gray',
              description: 'Candidate promoted to production',
              auto_inactive: false,
            });

      - name: Mark production deployment failed or partial
        if: >-
          always() && steps.production_deployment.outputs.id &&
          (steps.vercel_production.outcome != 'success' || steps.cloudflare_production.outcome != 'success')
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          PRODUCTION_DEPLOYMENT_ID: ${{ steps.production_deployment.outputs.id }}
          VERCEL_OUTCOME: ${{ steps.vercel_production.outcome }}
          CLOUDFLARE_OUTCOME: ${{ steps.cloudflare_production.outcome }}
          ROLLBACK_VERCEL: ${{ steps.compensate.outputs.rollback_vercel || 'n/a' }}
          ROLLBACK_CLOUDFLARE: ${{ steps.compensate.outputs.rollback_cloudflare || 'n/a' }}
          PREVIOUS_SHA: ${{ steps.previous_production.outputs.sha || '' }}
          PREVIOUS_FOUND: ${{ steps.previous_production.outputs.found }}
        with:
          script: |
            const vercel = process.env.VERCEL_OUTCOME;
            const cloudflare = process.env.CLOUDFLARE_OUTCOME;
            const rollbackVercel = process.env.ROLLBACK_VERCEL;
            const rollbackCloudflare = process.env.ROLLBACK_CLOUDFLARE;
            const partial = (vercel === 'success') !== (cloudflare === 'success');
            const rollbackFailed = rollbackVercel === 'failure' || rollbackCloudflare === 'failure';
            const compensated = rollbackVercel === 'success' || rollbackCloudflare === 'success';

            let description;
            if (partial && rollbackFailed) {
              description =
                `partial: vercel=${vercel}; cloudflare=${cloudflare}; ` +
                `rollback_vercel=${rollbackVercel}; rollback_cloudflare=${rollbackCloudflare}; ` +
                `previous_sha=${process.env.PREVIOUS_SHA || 'none'}`;
            } else if (partial && compensated) {
              description =
                `compensated: vercel=${vercel}; cloudflare=${cloudflare}; ` +
                `rollback_vercel=${rollbackVercel}; rollback_cloudflare=${rollbackCloudflare}; ` +
                `previous_sha=${process.env.PREVIOUS_SHA || 'none'}`;
            } else if (partial && process.env.PREVIOUS_FOUND !== 'true') {
              description =
                `partial: vercel=${vercel}; cloudflare=${cloudflare}; ` +
                'rollback_vercel=n/a; rollback_cloudflare=n/a; previous_sha=none';
            } else {
              description =
                `Production deployment failed; vercel=${vercel}; cloudflare=${cloudflare}; ` +
                `rollback_vercel=${rollbackVercel}; rollback_cloudflare=${rollbackCloudflare}`;
            }

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.PRODUCTION_DEPLOYMENT_ID),
              state: 'failure',
              environment: 'production',
              description,
              auto_inactive: false,
            });

      - name: Fail job when production targets did not both succeed
        if: >-
          always() &&
          (steps.vercel_production.outcome != 'success' || steps.cloudflare_production.outcome != 'success')
        run: |
          echo "::error::Production release incomplete (vercel=${{ steps.vercel_production.outcome }}, cloudflare=${{ steps.cloudflare_production.outcome }}, rollback_vercel=${{ steps.compensate.outputs.rollback_vercel || 'n/a' }}, rollback_cloudflare=${{ steps.compensate.outputs.rollback_cloudflare || 'n/a' }})"
          exit 1
